study:
  study_name: "smoke-test"
  direction: "minimize"
  storage: "sqlite:///optuna.db"
  n_trials: 1

dataloader:
  batch_size: 64
  data_path: /home/luke-padmore/Source/flow-matching-mnist/data
  num_workers: 0
  shuffle: true
  transform: "default"

unet:
  fixed:
    in_channels: 1
    group_norm_size: 8
    d_concat: 8
    upsample_mode: nearest
    mult: 2
  choices: 
    n_layers:
      type: int
      low: 2
      high: 5
    base: 
      type: int
      low: 16
      high: 64
      step: 16
    d_time:
      type: categorical
      choices: [64, 128, 256]
    activation_name:
      type: categorical
      choices: [silu, relu, gelu]
    max_time_period:
      type: categorical
      choices:
        [1000.0,10000.0]

optim:
  fixed:
    name: adamw
  choices:
    lr:
      type: float
      low: 1e-4
      high: 5e-4
      log: false
    # weight_decay:
    #   type: float
    #   low: 1e-6
    #   high: 1e-2
    #   log: true